<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦ IchtoWeb ✦</title>
    <style>
        :root {
            --bg-color: #120e2e;
            --container-bg: #1a163d;
            --border-color: #ff007f;
            --text-color: #e0d7ff;
            --accent-color: #00ffff;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--border-color) 0.5px, transparent 0.5px), radial-gradient(var(--border-color) 0.5px, var(--bg-color) 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            color: var(--text-color);
            font-family: "Courier New", Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .reconstruction-box {
            background-color: var(--container-bg);
            border: 5px double var(--border-color);
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.6);
            padding: 40px;
            text-align: center;
            max-width: 90%;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            color: var(--accent-color);
            text-shadow: 3px 3px 0px var(--border-color);
            letter-spacing: 2px;
            animation: blinker 1.5s linear infinite;
        }

        @keyframes blinker {
            50% { opacity: 0.3; }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }
            .reconstruction-box {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="reconstruction-box">
        <h1>RECONSTRUCTION IN PROGRESS!</h1>
    </div>

</body>
</html>
